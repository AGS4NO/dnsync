name: Test Action

on:
  pull_request:
    paths: [dns.yaml, '**/*.go', action.yml, Dockerfile]
  push:
    branches: [main]
    paths: [dns.yaml, '**/*.go', action.yml, Dockerfile]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - run: go test -v ./...

  dns-plan:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          dnsimple-token: ${{ secrets.DNSIMPLE_TOKEN }}
          dnsimple-account-id: ${{ secrets.DNSIMPLE_ACCOUNT_ID }}
          config-file: dns.yaml
          mode: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dns-apply:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          dnsimple-token: ${{ secrets.DNSIMPLE_TOKEN }}
          dnsimple-account-id: ${{ secrets.DNSIMPLE_ACCOUNT_ID }}
          config-file: dns.yaml
          mode: apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
