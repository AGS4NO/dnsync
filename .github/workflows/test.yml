name: Test Action

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: go test -v ./...

  dns-plan:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          dnsimple-token: ${{ secrets.DNSIMPLE_TOKEN }}
          dnsimple-account-id: ${{ secrets.DNSIMPLE_ACCOUNT_ID }}
          config-file: dns.yaml
          mode: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dns-plan-bind:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          dnsimple-token: ${{ secrets.DNSIMPLE_TOKEN }}
          dnsimple-account-id: ${{ secrets.DNSIMPLE_ACCOUNT_ID }}
          config-file: dns.zone
          config-format: bind
          manage-mode: partial
          state-file: .dnsync.bind.state.json
          audit-file: .dnsync.bind.audit.json
          mode: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dns-apply:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: ./
        with:
          dnsimple-token: ${{ secrets.DNSIMPLE_TOKEN }}
          dnsimple-account-id: ${{ secrets.DNSIMPLE_ACCOUNT_ID }}
          config-file: dns.yaml
          mode: apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./
        with:
          dnsimple-token: ${{ secrets.DNSIMPLE_TOKEN }}
          dnsimple-account-id: ${{ secrets.DNSIMPLE_ACCOUNT_ID }}
          config-file: dns.zone
          config-format: bind
          manage-mode: partial
          state-file: .dnsync.bind.state.json
          audit-file: .dnsync.bind.audit.json
          mode: apply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Debug state files
        run: ls -la .dnsync*
      - name: Commit state and audit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .dnsync.state.json .dnsync.audit.json .dnsync.bind.state.json .dnsync.bind.audit.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "chore: update dnsync state and audit log [skip ci]" && git push)
